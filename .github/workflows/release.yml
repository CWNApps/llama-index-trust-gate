name: Publish to PyPI

# Trusted Publishing via OIDC -- no PYPI_API_TOKEN secret needed.
# PyPI is pre-configured with a "Pending Publisher" matching:
#   owner       = CWNApps
#   repository  = <this repo>
#   workflow    = release.yml
#   environment = pypi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: Show built artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI via Trusted Publishing (OIDC)
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment must exist on the repo (Settings -> Environments)
    # AND PyPI's Pending Publisher must reference this environment name.
    environment:
      name: pypi
      url: https://pypi.org/project/${{ github.event.repository.name }}/
    permissions:
      id-token: write  # required for OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password` -- OIDC token is minted automatically by PyPI based on
        # the Pending Publisher config. attestations: true is the default in
        # recent versions; explicit for clarity.
        with:
          attestations: true
